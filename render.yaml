services:
  # Single service: React frontend + CodeIgniter 4 API in one container
  - type: web
    name: hpe-app
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    plan: free
    healthCheckPath: /
    envVars:
      - key: CI_ENVIRONMENT
        value: production
      - key: JWT_SECRET
        value: 816f7756cd38962fcf639278ae6f89c7bbaf9b0eb7c09276a00c38e261b64826
      - key: CORS_ORIGIN
        value: "*"
      # Automatically injected from the hpe-postgres database below
      - key: DATABASE_URL
        fromDatabase:
          name: hpe-postgres
          property: connectionString

databases:
  - name: hpe-postgres
    plan: free
    databaseName: hpe_asset_intelligence
    user: hpe_asset_intelligence_user
