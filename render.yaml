services:
  # Single service: React frontend + CodeIgniter 4 API in one container
  - type: web
    name: hpe-app
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    plan: free
    healthCheckPath: /api/auth/login
    envVars:
      - key: CI_ENVIRONMENT
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
      - key: DB_HOSTNAME
        sync: false
      - key: DB_DATABASE
        value: hpe_asset_intelligence
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_PORT
        value: 3306
